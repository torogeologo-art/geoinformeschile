# GeoInformesChile — recolector programado. (v2)
# Este archivo va en:  .github/workflows/recolector.yml
#
# v2: los secrets ahora entran como variables de entorno del trabajo (env),
# porque el parser de Actions no acepta `secrets.X` dentro de un `if` de paso.
#
# Nota honesta: el cron de Actions es best-effort; con carga los */15 se
# atrasan. Si el proyecto agarra tracción, muévelo a un VPS chico o a un
# Cloudflare Worker. Para el MVP, sirve y cuesta $0.

name: recolector

on:
  schedule:
    - cron: "*/15 * * * *"
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: recolector
  cancel-in-progress: false

jobs:
  correr:
    runs-on: ubuntu-latest
    env:
      TG_API_ID: ${{ secrets.TG_API_ID }}
      TG_API_HASH: ${{ secrets.TG_API_HASH }}
      TG_SESSION_B64: ${{ secrets.TG_SESSION_B64 }}
      YT_API_KEY: ${{ secrets.YT_API_KEY }}
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Dependencias
        run: pip install --quiet requests telethon anthropic

      # La session se generó UNA vez en el PC de Diego y vive como secret
      # en base64; aquí se reconstruye el archivo antes de correr Telegram.
      - name: Restaurar session de Telegram
        if: env.TG_SESSION_B64 != ''
        run: echo "$TG_SESSION_B64" | base64 -d > geoinformes.session

      - name: Telegram (SAE y alertas del canal oficial)
        if: env.TG_API_ID != ''
        run: python telegram_sae.py || echo "telegram falló; el colector sigue"

      - name: Colector SENAPRED
        run: python colector_senapred.py

      - name: Sectores geocodificados
        run: python geocodificar_sectores.py || echo "sectores falló; el resto sigue"

      - name: Videos por zona (YouTube)
        if: env.YT_API_KEY != ''
        run: python media_youtube.py || echo "media falló; los datos de alertas ya están"

      - name: GeoInforme del evento
        run: python generar_informe.py || echo "informe falló; el resto sigue"

      - name: Publicar datos
        run: |
          git config user.name  "geoinformes-bot"
          git config user.email "bot@users.noreply.github.com"
          git add -A
          git diff --cached --quiet || git commit -m "datos $(date -u +'%Y-%m-%dT%H:%MZ')"
          git pull --rebase origin main
          git push
